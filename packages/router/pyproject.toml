[project]
name = "operator-router"
version = "0.1.0"
description = "Intent router + fast-path table"
requires-python = ">=3.12"
dependencies = ["operator-registry"]

[tool.uv.sources]
operator-registry = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/operator_router"]
